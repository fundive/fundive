name = "fundive-push"
main = "src/index.ts"
compatibility_date = "2026-04-01"
# web-push depends on node:crypto / Buffer — Workers supports these under the
# nodejs_compat flag. No polyfills needed.
compatibility_flags = ["nodejs_compat"]

# Two crons:
#   - "0 2 * * *"    — daily reminder fan-out (02:00 UTC = 10:00 Asia/Taipei).
#   - "*/15 * * * *" — waitlist-offer processing (every 15 min): send pushes
#                      and emails for new offers, expire stale ones, chain
#                      expired offers to the next waitlister.
# Cloudflare cron triggers are always UTC.
[triggers]
crons = ["0 2 * * *", "*/15 * * * *"]

# Non-secret env can live here; secrets go via `wrangler secret put …`.
# See docs/push-notifications.md for the deploy runbook. Both are per-fork:
# point them at your own contact email and app origin(s) (comma-separated).
[vars]
VAPID_SUBJECT = "mailto:you@example.com"
ALLOWED_ORIGINS = "https://app.example.com"
TIMEZONE = "UTC"
CURRENCY = "USD"
