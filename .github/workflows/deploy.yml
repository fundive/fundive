name: Deploy to Cloudflare

# Manual, browser-triggered deploy of the two Cloudflare Workers this app ships:
#   - the SPA worker      (root wrangler.toml, name = "fundive-app")
#   - the push cron worker (workers/push/wrangler.toml, name = "fundive-push")
#
# This is a remote `make deploy`: it builds the SPA and pushes both workers'
# code. It does NOT push DB migrations, deploy Supabase edge functions, or set
# worker secrets — those stay with `wrangler secret put` / `supabase` CLI.
#
# ── Required repo secrets (Settings → Secrets and variables → Actions) ────────
# Everything shop-specific is a secret; nothing is hardcoded here, so a fork
# only needs to set these:
#
#   CLOUDFLARE_API_TOKEN     Token with the "Edit Cloudflare Workers" permission.
#   CLOUDFLARE_ACCOUNT_ID    Your Cloudflare account id (dashboard sidebar).
#
#   VITE_SUPABASE_URL        Baked into the SPA bundle at build (required).
#   VITE_SUPABASE_ANON_KEY   Baked into the SPA bundle at build (required).
#   VITE_TURNSTILE_SITE_KEY  Baked into the SPA bundle at build (required).
#
#   VITE_VAPID_PUBLIC_KEY    Optional — push toggle stays hidden if unset.
#   VITE_PUSH_WORKER_URL     Optional — origin of the deployed push worker.
#
# The three required VITE_* vars are enforced by vite.config.ts, which fails the
# build loudly if any is missing. The push worker's own secrets (VAPID_PRIVATE_KEY,
# SUPABASE_SERVICE_ROLE_KEY, ADMIN_TRIGGER_SECRET, …) are NOT set here — configure
# them once via `wrangler secret put` in workers/push. See docs/deployment.md.

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which worker(s) to deploy
        type: choice
        options:
          - both
          - spa
          - push
        default: both

permissions:
  contents: read

jobs:
  spa:
    name: Deploy SPA worker
    if: ${{ inputs.target == 'spa' || inputs.target == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SPA
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          VITE_PUSH_WORKER_URL: ${{ secrets.VITE_PUSH_WORKER_URL }}
        run: npm run build

      - name: Deploy SPA worker to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

  push:
    name: Deploy push cron worker
    if: ${{ inputs.target == 'push' || inputs.target == 'both' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/push
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/push/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy push worker to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
