name: DCO

# Verifies that every commit in a pull request carries a Developer Certificate
# of Origin sign-off ("Signed-off-by: Name <email>"), as required by
# CONTRIBUTING.md. Self-contained — no third-party actions, no supply-chain risk.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-sign-off:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR commits
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          # Iterate over every commit unique to this PR.
          for sha in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            subject=$(git show -s --format='%s' "$sha")
            # Skip merge commits — they are created by GitHub, not contributors.
            if [ "$(git show -s --format='%P' "$sha" | wc -w)" -gt 1 ]; then
              echo "skip (merge): $sha $subject"
              continue
            fi
            if git show -s --format='%B' "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "ok:   $sha $subject"
            else
              echo "MISS: $sha $subject"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "::error::One or more commits are missing a Developer Certificate of Origin sign-off."
            echo "Fix with:  git commit --amend -s   (or, for several commits, git rebase --signoff $BASE_SHA)"
            echo "See CONTRIBUTING.md for details."
            exit 1
          fi
          echo "All commits are signed off."
